default: &default
  adapter: trilogy
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  encoding: utf8mb4

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

integration:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

sqlite_source:
  adapter: sqlite3
  database: db/production.sqlite3
  pool: 5
